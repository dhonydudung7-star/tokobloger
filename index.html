<script>
        // Inisialisasi ikon Lucide
        lucide.createIcons();

        // Fungsi Menambah Baris Produk Baru Secara Dinamis
        function addProductRow() {
            const container = document.getElementById('productContainer');
            const row = document.createElement('tr');
            row.className = "border-b border-gray-50 align-middle product-row";
            row.innerHTML = `
                <td class="p-3"><input type="text" class="prod-title w-full bg-transparent focus:bg-white border-0 focus:ring-1 focus:ring-indigo-500 rounded p-1" value="Produk Baru Hijab"></td>
                <td class="p-3"><input type="number" class="prod-price w-full bg-transparent focus:bg-white border-0 focus:ring-1 focus:ring-indigo-500 rounded p-1" value="125000"></td>
                <td class="p-3"><input type="text" class="prod-img w-full bg-transparent focus:bg-white border-0 focus:ring-1 focus:ring-indigo-500 rounded p-1" value="https://images.unsplash.com/photo-1583391733956-3750e0ff4e8b?w=500"></td>
                <td class="p-3"><input type="text" class="prod-cat w-full bg-transparent focus:bg-white border-0 focus:ring-1 focus:ring-indigo-500 rounded p-1" value="Gamis"></td>
                <td class="p-3 text-center">
                    <button onclick="this.closest('tr').remove()" class="text-red-500 hover:text-red-700 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </td>
            `;
            container.appendChild(row);
            lucide.createIcons();
        }

        // FUNGSI UTAMA: Blogger XML Generator Engine
        function generateBloggerXML() {
            // Validasi Input Form
            const siteName = document.getElementById('siteName').value.replace(/[&<>"']/g, "");
            const whatsappNum = document.getElementById('whatsappNum').value;
            const seoTitle = document.getElementById('seoTitle').value.replace(/[&<>"']/g, "");
            const seoDesc = document.getElementById('seoDesc').value.replace(/[&<>"']/g, "");
            const themeColor = document.getElementById('themeColor').value;

            if(!siteName || !whatsappNum || !seoTitle) {
                alert("Mohon lengkapi seluruh field data utama website Anda!");
                return;
            }

            // Ekstrak Data Produk dari Tabel
            const productRows = document.querySelectorAll('.product-row');
            let productsArray = [];
            
            productRows.forEach(row => {
                const title = row.querySelector('.prod-title').value;
                const price = row.querySelector('.prod-price').value;
                const img = row.querySelector('.prod-img').value;
                const cat = row.querySelector('.prod-cat').value;
                productsArray.push({ title, price, img, category: cat });
            });

            const jsonProductsString = JSON.stringify(productsArray);

            // Template XML Struktur Inti Blogger
            const xmlTemplate = `<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<html b:version='2' class='v2' expr:dir='data:blog.languageDirection' xmlns='http://www.w3.org/1999/xhtml' xmlns:b='http://www.google.com/2000/b/?' xmlns:data='http://www.google.com/2000/b/data' xmlns:expr='http://www.google.com/2000/b/expr'>
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0"/>
    <title>${seoTitle}</title>
    <meta name="description" content="${seoDesc}"/>
    
    <meta property="og:type" content="website"/>
    <meta property="og:title" content="${seoTitle}"/>
    <meta property="og:description" content="${seoDesc}"/>
    <meta property="og:site_name" content="${siteName}"/>

    <b:skin><![CDATA[
    body {
        margin: 0; padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #FAFAFA; color: #2C2C2C;
    }
    .dtechno-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { background: #FFFFFF; border-bottom: 1px solid #EDEDED; padding: 15px 0; position: sticky; top: 0; z-index: 100; }
    .header-flex { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    .logo { font-size: 22px; font-weight: 700; color: ${themeColor}; text-decoration: none; }
    .grid-products { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; margin-top: 30px; }
    .card-prod { background: #FFF; border: 1px solid #EAEAEA; border-radius: 12px; overflow: hidden; transition: transform 0.2s; position: relative; }
    .card-prod:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .img-wrap { width: 100%; height: 260px; background-size: cover; background-position: center; }
    .prod-info { padding: 15px; }
    .prod-tag { font-size: 11px; background: #F1F1F1; padding: 3px 8px; rounded: 4px; display: inline-block; color: #666; font-weight: 600; margin-bottom: 8px;}
    .prod-name { font-size: 16px; font-weight: 600; margin: 5px 0; color: #111; }
    .prod-price-text { color: ${themeColor}; font-weight: 700; font-size: 17px; margin-bottom: 15px; }
    .btn-order { display: block; text-align: center; background: ${themeColor}; color: #FFF; text-decoration: none; padding: 10px; border-radius: 8px; font-weight: 600; font-size: 14px; transition: opacity 0.2s; }
    .btn-order:hover { opacity: 0.9; }
    ]]></b:skin>
</head>
<body>

    <header>
        <div class="header-flex">
            <a class="logo" href="/">${siteName}</a>
            <div class="cart-status">
                <span style="font-size:14px; color:#666;">WhatsApp Order Online</span>
            </div>
        </div>
    </header>

    <b:section id='main-content' showaddelement='yes'>
        <b:widget id='Blog1' locked='true' title='Blog Posts' type='Blog'>
            <b:includable id='main'>
                
                <div class="dtechno-container">
                    <div class="grid-products" id="product-grid-target"></div>
                </div>

                <script type='text/javascript'>
                //<![CDATA[
                const dataPoductsFromSaaS = ${jsonProductsString};
                const waNumber = "${whatsappNum}";

                function renderProducts() {
                    const target = document.getElementById('product-grid-target');
                    target.innerHTML = '';
                    
                    dataPoductsFromSaaS.forEach(prod => {
                        const messageWa = encodeURIComponent("Halo " + "${siteName}" + ", saya ingin memesan produk ini:\\n\\n" + "*Nama Produk:* " + prod.title + "\\n*Harga:* Rp " + parseInt(prod.price).toLocaleString('id-ID') + "\\n\\nMohon info detail metode pengirimannya.");
                        const waUrl = "https://api.whatsapp.com/send?phone=" + waNumber + "&text=" + messageWa;

                        const card = document.createElement('div');
                        card.className = 'card-prod';
                        card.innerHTML = \`
                            <div class="img-wrap" style="background-image: url('\${prod.img}')"></div>
                            <div class="prod-info">
                                <span class="prod-tag">\${prod.category}</span>
                                <h3 class="prod-name">\${prod.title}</h3>
                                <div class="prod-price-text">Rp \${parseInt(prod.price).toLocaleString('id-ID')}</div>
                                <a href="\${waUrl}" target="_blank" class="btn-order">Beli Lewat WhatsApp</a>
                            </div>
                        \`;
                        target.appendChild(card);
                    });
                }
                
                // Jalankan proses render saat DOM siap
                document.addEventListener("DOMContentLoaded", renderProducts);
                //]]>
                <\/script>

            </b:includable>
        </b:widget>
    </b:section>

</body>
</html>`;

            // Render ke Output Monitor Dashboard
            document.getElementById('xmlConsole').value = xmlTemplate;

            // Membuat File Otomatis untuk Diunduh Langsung oleh Pengguna
            const blob = new Blob([xmlTemplate], { type: "text/xml" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = siteName.toLowerCase().replace(/\s+/g, "-") + "-template.xml";
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }
    </script>
